<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — JobSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================================================================
       JobSphere — Premium Dark Neon Profile Engine Stylesheet
       Theme: Midnight Navy Core with Electric Cyan & Indigo Accents
    ================================================================== */

        :root {
            --bg-navy: #0A0F1E;
            --sidebar-bg: rgba(10, 15, 30, 0.9);
            --card-bg: #111827;
            --border-color: #1E2A42;
            --indigo-main: #4F46E5;
            --indigo-light: #6366F1;
            --cyan-main: #06B6D4;
            --cyan-light: #22D3EE;
            --pink-alert: #EC4899;
            --green-success: #10B981;
            --text-main: #F1F5F9;
            --text-sub: #94A3B8;
            --text-muted: #64748B;
            --sidebar-width: 260px;
        }

        /* ─── BASE RESET ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-navy);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            line-height: 1.5;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(79, 70, 229, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 110%, rgba(6, 182, 212, 0.08) 0%, transparent 55%);
            background-attachment: fixed;
        }

        /* ─── SIDEBAR NAVIGATION (Ecosystem Sync) ─── */
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-brand {
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .sidebar-brand h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .sidebar-brand span {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--cyan-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-top: 2px;
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        #userAvatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--indigo-main), var(--cyan-main));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
            box-shadow: 0 0 12px rgba(79, 70, 229, 0.3);
        }

        .user-info h4 {
            font-size: 0.85rem;
            font-weight: 600;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-info p {
            font-size: 0.7rem;
            color: var(--cyan-light);
            font-weight: 500;
        }

        #sidebar nav h3 {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin: 20px 0 10px 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.25s ease;
            margin-bottom: 4px;
        }

        .nav-link i {
            width: 16px;
            text-align: center;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .nav-link.active {
            background: rgba(79, 70, 229, 0.15);
            color: var(--indigo-light);
            font-weight: 600;
            border-left: 3px solid var(--indigo-main);
        }

        .logout-btn {
            color: #f87171;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
        }

        /* ─── MAIN CENTRAL WORKSPACE ─── */
        #mainContent {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
            max-width: 1100px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 850px;
            overflow: hidden;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        /* ─── WORKSPACE TOP PROFILE HEADER ─── */
        .profile-header {
            background: linear-gradient(135deg, rgba(26, 36, 68, 0.8), rgba(17, 24, 39, 0.9));
            border-bottom: 1px solid var(--border-color);
            padding: 35px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            position: relative;
        }

        .header-cover-badge {
            position: relative;
            flex-shrink: 0;
        }

        #largeProfileInitials {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--indigo-main), var(--cyan-main));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.25);
        }

        .header-details-meta h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        #view_badgeRole {
            display: inline-block;
            margin-top: 6px;
            background: rgba(6, 182, 212, 0.12);
            border: 1px solid rgba(6, 182, 212, 0.25);
            color: var(--cyan-light);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 20px;
        }

        /* Dynamic Profile Actions Trigger */
        .action-edit-toggle {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .action-edit-toggle:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        /* ─── STRUCTURAL FORM & INPUT EDIT CORES ─── */
        #profileForm {
            padding: 40px;
        }

        .form-grid-sections {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group label i {
            color: var(--indigo-light);
            font-size: 0.85rem;
        }

        /* Standard Label View Block Modes */
        .value-display-mode {
            font-size: 0.95rem;
            font-weight: 500;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            min-height: 48px;
            display: flex;
            align-items: center;
            color: var(--text-main);
            transition: background 0.2s ease;
        }

        .value-display-mode.readonly {
            background: rgba(255, 255, 255, 0.01);
            color: var(--text-sub);
            cursor: not-allowed;
        }

        .live-resume-anchor {
            color: var(--cyan-light);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .live-resume-anchor:hover {
            text-decoration: underline;
            color: var(--cyan-main);
        }

        .muted-text {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Interactive Data Inputs (Hidden by default structure layer) */
        .editor-input-field {
            font-size: 0.95rem;
            font-weight: 500;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: var(--text-main);
            outline: none;
            width: 100%;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: none;
            /* Controlled via State Class Engine */
        }

        .editor-input-field:focus {
            border-color: var(--cyan-main);
            background: rgba(6, 182, 212, 0.04);
            box-shadow: 0 0 16px rgba(6, 182, 212, 0.25);
        }

        .editor-input-field:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            border-color: var(--border-color);
        }

        /* ─── DYNAMIC STATE CONTROL INJECTIONS ─── */
        body.edit-mode-active .value-display-mode {
            display: none !important;
        }

        body.edit-mode-active .editor-input-field {
            display: block !important;
        }

        body.edit-mode-active .action-edit-toggle {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        body.edit-mode-active .action-edit-toggle:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        /* Form Interactive Option Panels */
        .form-action-controls {
            margin-top: 35px;
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
            display: flex;
            justify-content: flex-end;
            gap: 14px;
        }

        .cancel-edit-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cancel-edit-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        .save-profile-btn {
            background: linear-gradient(135deg, var(--indigo-main), var(--indigo-light));
            border: none;
            color: #fff;
            padding: 12px 26px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            transition: all 0.25s ease;
        }

        .save-profile-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(79, 70, 229, 0.45);
        }

        /* ─── TOAST NOTIFICATION WINDOW ─── */
        .toast-popup-window {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast-popup-window.active-toast {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-success {
            background: #064e3b;
            border: 1px solid var(--green-success);
            color: #a7f3d0;
        }

        .toast-error {
            background: #7f1d1d;
            border: 1px solid #ef4444;
            color: #fca5a5;
        }

        /* ─── MOBILE ADAPTIVE RESPONSIVENESS ─── */
        @media (max-width: 768px) {
            #sidebar {
                width: 70px;
                padding: 15px 10px;
            }

            .sidebar-brand h2,
            .sidebar-brand span,
            .user-info,
            #sidebar nav h3,
            .nav-link span {
                display: none;
            }

            .sidebar-user {
                padding: 5px;
                justify-content: center;
            }

            .nav-link {
                justify-content: center;
                padding: 12px;
            }

            #mainContent {
                margin-left: 70px;
                padding: 20px;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
                padding-bottom: 25px;
            }

            .action-edit-toggle {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                margin-top: 15px;
                width: 100%;
                justify-content: center;
            }

            .form-grid-sections {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            #profileForm {
                padding: 25px 20px;
            }

            .form-action-controls {
                flex-direction: column-reverse;
            }

            .cancel-edit-btn,
            .save-profile-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>

</head>

<body>

    <aside id="sidebar">
        <div class="sidebar-brand">
            <h2>💼 JobSphere</h2>
            <span>User Hub</span>
        </div>

        <div class="sidebar-user">
            <div id="userAvatar">-</div>
            <div class="user-info">
                <h4 id="userNameDisplay">Loading...</h4>
                <p id="userRoleDisplay">Verifying...</p>
            </div>
        </div>

        <nav>
            <div id="seekerMenu" style="display:none;">
                <h3>Job Hunting</h3>
                <a href="UserHome.html" class="nav-link"><i class="fa fa-chart-pie"></i> Dashboard</a>
                <a href="UserJob.html" class="nav-link"><i class="fa fa-briefcase"></i> Browse Jobs</a>
                <a href="UserCompanies.html" class="nav-link"><i class="fa fa-building"></i> Companies</a>
                <a href="applications.html" class="nav-link"><i class="fa fa-paper-plane"></i> My Applications</a>
                <a href="#" class="nav-link active"><i class="fa fa-user"></i> My Profile</a>
            </div>

            <div id="employerMenu" style="display:none;">
                <h3>Recruitment</h3>
                <a href="UserHome.html" class="nav-link"><i class="fa fa-chart-pie"></i> Dashboard</a>
                <a href="create-job.html" class="nav-link"><i class="fa fa-plus-circle"></i> Post a Job</a>
                <a href="manage-jobs.html" class="nav-link"><i class="fa fa-tasks"></i> Manage Listings</a>
            </div>

            <div class="account-menu">
                <h3>Account</h3>
                <a href="#" onclick="logoutUser(); return false;" class="nav-link logout-btn">
                    <i class="fa fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </nav>
    </aside>

    <main id="mainContent">
        <div class="profile-card">

            <div class="profile-header">
                <div class="header-cover-badge">
                    <div id="largeProfileInitials">JM</div>
                </div>
                <div class="header-details-meta">
                    <h1 id="view_fullName">Profile Name</h1>
                    <p id="view_badgeRole">JOB_SEEKER</p>
                </div>
                <button type="button" id="editToggleBtn" class="action-edit-toggle" onclick="toggleEditMode()">
                    <i class="fa fa-edit"></i> Edit Profile
                </button>
            </div>

            <form id="profileForm" onsubmit="handleProfileUpdateSubmit(event)">
                <div class="form-grid-sections">

                    <div class="form-group">
                        <label><i class="fa fa-user-circle"></i> Full Name</label>
                        <div class="value-display-mode" id="lbl_fullName">Loading Name...</div>
                        <input type="text" id="i_fullName" class="editor-input-field" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fa fa-envelope"></i> Email Address</label>
                        <div class="value-display-mode" id="lbl_email">Loading Email...</div>
                        <input type="email" id="i_email" class="editor-input-field" readonly disabled>
                    </div>

                    <div class="form-group">
                        <label><i class="fa fa-phone"></i> Phone Number</label>
                        <div class="value-display-mode" id="lbl_phone">Not Assigned</div>
                        <input type="text" id="i_phone" class="editor-input-field">
                    </div>

                    <div class="form-group">
                        <label><i class="fa fa-file-pdf"></i> Resume Document URL</label>
                        <div class="value-display-mode" id="lbl_resume">
                            <span class="muted-text">No document linked</span>
                        </div>
                        <input type="url" id="i_resume" class="editor-input-field"
                            placeholder="https://drive.google.com/.../view">
                    </div>

                </div>

                <div class="form-action-controls" style="display: none;" id="editorControlPanel">
                    <button type="button" class="cancel-edit-btn" onclick="toggleEditMode()">Cancel</button>
                    <button type="submit" class="save-profile-btn"><i class="fa fa-save"></i> Save System
                        Records</button>
                </div>
            </form>

        </div>
    </main>

    <div id="toastNotificationHub" class="toast-popup-window"></div>

    <script>
        const STORAGE_TOKEN_KEY = "token";
        const STORAGE_USER_KEY = "user";

        let isEditStateActive = false;
        let globalCachedUserData = {};

        // Page Init Interceptor
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem(STORAGE_TOKEN_KEY);
            const userRaw = localStorage.getItem(STORAGE_USER_KEY);

            if (!token || !userRaw) {
                window.location.href = "Login.html";
                return;
            }

            try {
                const user = JSON.parse(userRaw);
                setupSidebarProfile(user);

                // Live Spring Boot Endpoint Profile Pull
                fetchSecureUserProfile(token);
            } catch (err) {
                console.error("Authorization sync failed:", err);
                logoutUser();
            }
        });

        // Sidebar user display logic
        function setupSidebarProfile(user) {
            let currentRole = user.role ? user.role.toUpperCase() : "JOB_SEEKER";
            if (currentRole === "SEEKER") currentRole = "JOB_SEEKER";

            const displayName = user.name || (user.email ? user.email.split('@')[0] : "User");
            document.getElementById("userAvatar").textContent = displayName.substring(0, 2).toUpperCase();
            document.getElementById("userNameDisplay").textContent = displayName;
            document.getElementById("userRoleDisplay").textContent = currentRole === "JOB_SEEKER" ? "Job Seeker" : "Employer";

            if (currentRole === "EMPLOYER") {
                document.getElementById("employerMenu").style.display = "block";
            } else {
                document.getElementById("seekerMenu").style.display = "block";
            }
        }

        // GET /api/user/profile Secure Database Fetch
        async function fetchSecureUserProfile(token) {
            try {
                const response = await fetch("http://localhost:8080/api/user/profile", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!response.ok) throw new Error("Could not pull updated authorization identity schema.");

                globalCachedUserData = await response.json();
                populateProfileInterface(globalCachedUserData);

            } catch (err) {
                console.error(err);
                triggerToastAlert("❌ Failed to pull secure profile records from Server.", "error");
            }
        }

        // Populate Views & Inputs
        function populateProfileInterface(data) {
            // Meta Top views
            const calculatedName = data.full_name || data.fullName || "User Name";
            document.getElementById("view_fullName").textContent = calculatedName;
            document.getElementById("view_badgeRole").textContent = data.role || "JOB_SEEKER";
            document.getElementById("largeProfileInitials").textContent = calculatedName.substring(0, 2).toUpperCase();

            // Form values mapping (Label view modes)
            document.getElementById("lbl_fullName").textContent = calculatedName;
            document.getElementById("lbl_email").textContent = data.email || "N/A";
            document.getElementById("lbl_phone").textContent = data.phone_number || data.phoneNumber || "Not Provisioned";

            // Resume Link render check
            const targetResume = data.resume_url || data.resumeUrl;
            const lblResume = document.getElementById("lbl_resume");
            if (targetResume) {
                lblResume.innerHTML = `<a href="${targetResume}" target="_blank" class="live-resume-anchor"><i class="fa fa-external-link-alt"></i> View Uploaded Document</a>`;
            } else {
                lblResume.innerHTML = `<span class="muted-text">No document linked</span>`;
            }

            // Input Fields setup for editor context
            document.getElementById("i_fullName").value = calculatedName;
            document.getElementById("i_email").value = data.email || "";
            document.getElementById("i_phone").value = data.phone_number || data.phoneNumber || "";
            document.getElementById("i_resume").value = targetResume || "";
        }

        // Toggle Form Edit System Engine (Matches PostOffice mechanism)
        function toggleEditMode() {
            isEditStateActive = !isEditStateActive;
            const formContainer = document.getElementById("profileForm");
            const toggleBtn = document.getElementById("editToggleBtn");
            const controlPanel = document.getElementById("editorControlPanel");

            if (isEditStateActive) {
                document.body.classList.add("edit-mode-active");
                toggleBtn.innerHTML = `<i class="fa fa-times"></i> Exit Editor`;
                controlPanel.style.display = "flex";
            } else {
                document.body.classList.remove("edit-mode-active");
                toggleBtn.innerHTML = `<i class="fa fa-edit"></i> Edit Profile`;
                controlPanel.style.display = "none";
                // Reset to saved state
                populateProfileInterface(globalCachedUserData);
            }
        }

        // PUT /api/user/profile Form Submit Sync
        async function handleProfileUpdateSubmit(e) {
            e.preventDefault();
            const token = localStorage.getItem(STORAGE_TOKEN_KEY);

            // Construct DTO structural packet matching MySQL column properties mapping
            const profilePayloadDTO = {
                full_name: document.getElementById("i_fullName").value.trim(),
                email: document.getElementById("i_email").value.trim(),
                phone_number: document.getElementById("i_phone").value.trim(),
                resume_url: document.getElementById("i_resume").value.trim(),
                role: globalCachedUserData.role || "JOB_SEEKER"
            };

            try {
                const response = await fetch("http://localhost:8080/api/user/profile", {
                    method: "PUT",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(profilePayloadDTO)
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(errorMsg || "Database rejected schema write mapping process.");
                }

                // Success
                triggerToastAlert("✅ Profile Records Updated Successfully on MySQL Database!", "success");

                // Local memory caching parameters refresh
                globalCachedUserData = { ...globalCachedUserData, ...profilePayloadDTO };

                // Sidebar visual identity update optimization
                const userSessionObj = JSON.parse(localStorage.getItem(STORAGE_USER_KEY));
                userSessionObj.name = profilePayloadDTO.full_name;
                localStorage.setItem(STORAGE_USER_KEY, JSON.stringify(userSessionObj));
                setupSidebarProfile(userSessionObj);

                // Exit Edit states and load data
                toggleEditMode();
                populateProfileInterface(globalCachedUserData);

            } catch (err) {
                console.error(err);
                triggerToastAlert(`❌ Update Failed: ${err.message}`, "error");
            }
        }

        // Toast alert pipeline
        function triggerToastAlert(msg, mode) {
            const toast = document.getElementById("toastNotificationHub");
            toast.textContent = msg;
            toast.className = `toast-popup-window active-toast ${mode === "success" ? "toast-success" : "toast-error"}`;

            setTimeout(() => {
                toast.classList.remove("active-toast");
            }, 4000);
        }

        // Safe Sign-Out system cleanup
        function logoutUser() {
            localStorage.removeItem(STORAGE_TOKEN_KEY);
            localStorage.removeItem(STORAGE_USER_KEY);
            window.location.href = "../index.html";
        }
    </script>
</body>

</html>
