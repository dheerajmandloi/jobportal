<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Application — JobSphere</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==================================================================
       JobSphere — Glassmorphic Application Form Stylesheet
       Theme: Midnight Cyber Navy with Electric Cyan & Indigo Accents
    ================================================================== */
        :root {
            --bg-navy: #060a12;
            --card-bg: rgba(15, 23, 42, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-focus: #6366f1;
            --indigo-main: #4f46e5;
            --indigo-light: #6366f1;
            --cyan-main: #06b6d4;
            --cyan-light: #22d3ee;
            --pink-alert: #ec4899;
            --green-success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-blur: blur(16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at 0% 0%, #0f172a 0%, #060a12 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Cyber Glow Background Spheres */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            z-index: 0;
            pointer-events: none;
        }

        /* Glassmorphic Shell Wrapper container */
        .glass-form-container {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 680px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
            animation: fadeInContainer 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInContainer {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Header block designs */
        .form-header {
            margin-bottom: 35px;
            text-align: center;
            position: relative;
        }

        .form-header .brand-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(79, 70, 229, 0.15);
            border: 1px solid rgba(79, 70, 229, 0.3);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--cyan-light);
            margin-bottom: 16px;
        }

        .form-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 50%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 8px;
        }

        /* Context Target Job Preview Card layout Frame */
        .job-preview-banner {
            background: rgba(30, 41, 59, 0.4);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .job-details-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .job-details-group .job-title-label {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .job-details-group .job-id-tag {
            font-size: 0.8rem;
            color: var(--cyan-main);
            font-family: monospace;
            font-weight: 600;
        }

        .job-preview-banner .badge-verified-target {
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: var(--green-success);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Structural Field Grid Blocks controls */
        .field-block {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-block label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field-block label i {
            color: var(--indigo-light);
            font-size: 0.9rem;
        }

        .input-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.25s ease;
        }

        .input-control:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        textarea.input-control {
            min-height: 150px;
            resize: vertical;
            line-height: 1.6;
        }

        .input-control::placeholder {
            color: rgba(148, 163, 184, 0.45);
        }

        /* Action Panel controls alignment */
        .form-actions {
            margin-top: 35px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 16px;
        }

        .btn-submit,
        .btn-cancel {
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            outline: none;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--indigo-main) 0%, #3b82f6 100%);
            border: none;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
            filter: brightness(1.1);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: #e2e8f0;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Toast Popup Window Alert Elements Styles */
        [id="responseAlert"] {
            display: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 24px;
            line-height: 1.5;
            animation: slideDownAlert 0.3s ease forwards;
        }

        @keyframes slideDownAlert {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: rgba(244, 63, 94, 0.12);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: #fda4af;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #a7f3d0;
        }

        /* Mobile Responsive Breakpoint adjustment matrix */
        @media(max-width: 576px) {
            .glass-form-container {
                padding: 24px;
            }

            .form-actions {
                grid-template-columns: 1fr;
            }

            .form-header h1 {
                font-size: 1.6rem;
            }

            .job-preview-banner {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="glass-form-container">
        <div class="form-header">
            <div class="brand-pill"><i class="fas fa-shield-halved"></i> Secure JobSphere Dispatch</div>
            <h1>Submit Application</h1>
            <p>Complete your application request wrapper terminal safely below.</p>
        </div>

        <div class="job-preview-banner">
            <div class="job-details-group">
                <span id="jobTitleDisplay" class="job-title-label">Loading Position Metadata...</span>
                <span id="jobIdDisplay" class="job-id-tag">JOB-ID: PENDING SYNC</span>
            </div>
            <div class="badge-verified-target">
                <i class="fas fa-check-circle"></i> Pipeline Active
            </div>
        </div>

        <div id="responseAlert"></div>

        <form id="applicationForm" onsubmit="executeApplicationSubmissionPipeline(event)">

            <div class="field-block">
                <label for="formResumeLink"><i class="fas fa-link"></i> Digital Resume Link / Cloud Asset</label>
                <input type="text" id="formResumeLink" class="input-control"
                    placeholder="Checking user profile configuration..." required>
            </div>

            <div class="field-block">
                <label for="formCoverLetter"><i class="fas fa-file-alt"></i> Brief Pitch / Cover Summary</label>
                <textarea id="formCoverLetter" class="input-control"
                    placeholder="Briefly state why your skills align perfectly with this Spring Boot stack architecture..."
                    required></textarea>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="abortFormRoute()">Cancel</button>
                <button type="submit" id="submitFormButton" class="btn-submit">
                    <i class="fas fa-rocket"></i> Dispatch Application
                </button>
            </div>
        </form>
    </div>

    <script>
        const STORAGE_TOKEN_KEY = "token";
        const API_PROFILE_ENDPOINT = "http://localhost:8080/api/user/profile";
        const API_APPLY_ENDPOINT = "http://localhost:8080/api/application/apply";

        let globalResumeUrlPath = null;
        let currentTargetJobId = null;

        // Orchestrate application runtime interceptors on DOM ready state
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem(STORAGE_TOKEN_KEY);
            if (!token) {
                alert("Session token expired or missing. Directing to login.");
                window.location.href = "Login.html";
                return;
            }

            // Hydrate Targeted Job Node context from browse page local state
            hydrateTargetJobMetadata();

            // Securely look up user profile context to verify talent resume attachment assets
            fetchUserProfileAsset(token);
        });

        /**
         * Extracts targeted job descriptor metadata cached in state mapping sequence
         */
        function hydrateTargetJobMetadata() {
            const serializedJob = localStorage.getItem("selectedJob");
            if (!serializedJob) {
                displayAlert("Error: Direct job reference context missing. Returning to terminal browse hub.", "error");
                setTimeout(() => { window.location.href = "UserJob.html"; }, 3000);
                return;
            }

            try {
                const parsedJob = JSON.parse(serializedJob);

                // Map state tracking parameters
                currentTargetJobId = parsedJob.jobId || parsedJob.job_id || parsedJob.id;

                // Render textual descriptor values inside static page containers cleanly
                const jobTitleContainer = document.getElementById("jobTitleDisplay");
                const jobIdContainer = document.getElementById("jobIdDisplay");

                if (jobTitleContainer) jobTitleContainer.textContent = parsedJob.title || parsedJob.jobTitle || "Technical Position";
                if (jobIdContainer) jobIdContainer.textContent = currentTargetJobId || "N/A";

            } catch (err) {
                console.error("Critical Failure parsing internal state job descriptors:", err);
                displayAlert("Failed to load chosen job parameter vectors from local cache storage.", "error");
            }
        }

        /**
         * Pulls core user account entity using active Auth Header Context
         */
        async function fetchUserProfileAsset(token) {
            const resumeFieldInput = document.getElementById("formResumeLink");

            try {
                const response = await fetch(API_PROFILE_ENDPOINT, {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!response.ok) {
                    throw new Error("Spring Boot profile service rejected session authentication sequence.");
                }

                const profileData = await response.json();

                if (profileData && profileData.resumeUrl && profileData.resumeUrl.trim() !== "") {
                    globalResumeUrlPath = profileData.resumeUrl.trim();

                    // Extrapolate simple filename string vector from resource path structure safely
                    const targetFileName = globalResumeUrlPath.substring(globalResumeUrlPath.lastIndexOf('/') + 1) || "Linked-Resume.pdf";

                    if (resumeFieldInput) {
                        resumeFieldInput.value = `📄 ${targetFileName}`;
                        resumeFieldInput.disabled = true; // Lock field strictly for rendering display purposes
                        resumeFieldInput.style.cursor = "not-allowed";
                        resumeFieldInput.style.opacity = "0.8";
                    }
                } else {
                    globalResumeUrlPath = null;
                    if (resumeFieldInput) {
                        resumeFieldInput.value = "No Resume Uploaded";
                        resumeFieldInput.disabled = true;
                        resumeFieldInput.style.color = "#ec4899"; // Display neon warning accent matching premium UI theme
                    }
                }

            } catch (err) {
                console.error("Failed to safely authenticate profile metadata state architecture:", err);
                displayAlert("Error loading candidate profile records. Verify system access connectivity status.", "error");
                if (resumeFieldInput) {
                    resumeFieldInput.value = "Unable to verify secure file asset links";
                    resumeFieldInput.disabled = true;
                }
            }
        }

        /**
         * Handles formal application form submission pipeline dispatching
         */
        async function executeApplicationSubmissionPipeline(event) {
            event.preventDefault();

            const token = localStorage.getItem(STORAGE_TOKEN_KEY);
            const coverLetterValue = document.getElementById("formCoverLetter") ? document.getElementById("formCoverLetter").value.trim() : "";
            const submitButton = document.getElementById("submitFormButton");

            // 1. Structural cover letter data validations
            if (!coverLetterValue) {
                displayAlert("Please write a brief pitch summary before processing dispatch parameters.", "error");
                return;
            }

            // 2. Rigid validation to verify presence of talent resume asset linkage
            if (!globalResumeUrlPath) {
                displayAlert("Please upload your resume in My Profile before applying.", "error");
                return;
            }

            if (!currentTargetJobId) {
                displayAlert("Critical Context Failure: Target job descriptor id missing. Aborting operation.", "error");
                return;
            }

            // UI State Interceptor: Restrict multiple rapid form triggers
            const originalButtonHtmlMarkup = submitButton.innerHTML;
            submitButton.disabled = true;
            submitButton.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Dispatched Processing Node...`;

            // 3. Construct clean optimized deployment request schema matching new rules framework exactly
            const requestPayload = {
                jobId: LongifyValue(currentTargetJobId),
                coverLetter: coverLetterValue
            };

            try {
                const response = await fetch(API_APPLY_ENDPOINT, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(requestPayload)
                });

                if (response.ok) {
                    displayAlert("🚀 Application Transferred Successfully! Syncing tracking modules...", "success");

                    // Clear state memory parameters cleanly
                    localStorage.removeItem("selectedJob");

                    setTimeout(() => {
                        window.location.href = "UserApplication.html";
                    }, 2200);

                } else {
                    const functionalServerErrorText = await response.text();
                    throw new Error(functionalServerErrorText || "Spring Boot internal service threw validation exceptions.");
                }

            } catch (pipelineErr) {
                console.error("Critical Exception caught during data dispatch sequence operations:", pipelineErr);
                displayAlert(`Transaction Refused: ${pipelineErr.message}`, "error");

                // Restore button operational states safely
                submitButton.disabled = false;
                submitButton.innerHTML = originalButtonHtmlMarkup;
            }
        }

        /**
         * Utility tool to ensure job identity values are parsed into consistent number formatting
         */
        function LongifyValue(inputVal) {
            const parsedValue = parseInt(inputVal, 10);
            return isNaN(parsedValue) ? inputVal : parsedValue;
        }

        /**
         * Aborts contextual workflow stream routing paths cleanly
         */
        function abortFormRoute() {
            localStorage.removeItem("selectedJob");
            window.location.href = "UserJob.html";
        }

        /**
         * Utility alert message view component box state mapping modifier logic
         */
        function displayAlert(message, type) {
            const responseAlertBox = document.getElementById("responseAlert");
            if (!responseAlertBox) return;

            responseAlertBox.style.display = "block";
            responseAlertBox.textContent = message;

            if (type === "success") {
                responseAlertBox.className = "alert-success";
            } else {
                responseAlertBox.className = "alert-error";
            }

            responseAlertBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>

</html>
