<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JobSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================================================================
   JobSphere — Dark Neon Glassmorphism Stylesheet
   Theme: Midnight Blue with Electric Blue & Pink Accents
==================================================================
*/

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* ─── NAVBAR STYLING ─── */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 100;
        }

        nav .brand {
            font-weight: 600;
            font-size: 1.3rem;
            color: #4facfe;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        nav .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav .nav-links a:hover {
            color: #00f2fe;
        }

        /* ─── GLASSMORPHIC LOGIN CARD ─── */
        .login-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            animation: fadeInScale 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 35px;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ─── INPUT FIELDS STYLING ─── */
        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 48px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 0.92rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #64748b;
        }

        input:focus {
            border-color: #4facfe;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 18px rgba(79, 172, 254, 0.25);
        }

        input:focus~i {
            color: #00f2fe;
        }

        /* ─── UTILITY LINKS & ACTIONS ─── */
        .forgot-link {
            display: block;
            text-align: right;
            margin-top: -12px;
            margin-bottom: 28px;
            font-size: 0.82rem;
            font-weight: 500;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-link:hover {
            color: #ff6b6b;
        }

        /* ─── ACTION BUTTON STYLING ─── */
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 12px 24px -6px rgba(79, 172, 254, 0.35);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.08);
            box-shadow: 0 15px 28px -4px rgba(79, 172, 254, 0.45);
        }

        button:active {
            transform: translateY(0);
        }

        /* ─── FOOTER LINK TEXT ─── */
        .footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 0.88rem;
            color: #94a3b8;
        }

        .footer-text a {
            color: #4facfe;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .footer-text a:hover {
            color: #00f2fe;
            text-decoration: underline;
        }

        /* ─── MOBILE RESPONSIVENESS ─── */
        @media (max-width: 480px) {
            nav {
                padding: 15px 20px;
            }

            .login-card {
                padding: 35px 25px;
                margin: 0 15px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="brand">JobSphere</a>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="registrationroles.html">Register</a>
        </div>
    </nav>

    <div class="login-card">
        <h2>Member Login</h2>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <a href="#" class="forgot-link" onclick="forgotPassword(event)">Forgot Password?</a>

            <button type="submit" id="submitBtn">Sign In</button>
        </form>

        <p class="footer-text">
            Don't have an account? <a href="UserRegistration.html">Register</a>
        </p>
    </div>
    <script>
        // --- Forgot Password Workflow Handler ---
        async function forgotPassword(event) {
            event.preventDefault();

            const email = prompt("Enter your registered email:");
            if (!email) return;

            try {
                // Port changed to 8080
                const res = await fetch('http://localhost:8080/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (!res.ok) throw new Error("User email identity not found ❌");

                const data = await res.json();
                alert("Reset Token (for local staging test): " + data.token);

                const newPassword = prompt("Enter your new secure password:");
                if (!newPassword) return;

                // Port changed to 8080
                const resetRes = await fetch('http://localhost:8080/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: data.token,
                        newPassword: newPassword
                    })
                });

                if (resetRes.ok) {
                    alert("Password updated successfully inside JobSphere ecosystem ✅");
                } else {
                    throw new Error("Password reset failed execution process stream.");
                }
            } catch (err) {
                alert(err.message);
            }
        }

        // --- Core Authentication Form Submission Event Listener Flow ---
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const btn = document.getElementById("submitBtn");
            const emailValue = document.getElementById("email").value.trim();
            const passwordValue = document.getElementById("password").value;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.style.pointerEvents = "none";

            try {

                const res = await fetch("http://localhost:8080/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: emailValue,
                        password: passwordValue
                    })
                });

                if (!res.ok) {
                    throw new Error("Invalid Email or Password");
                }

                // Backend JWT String return kar raha hai
                const token = await res.text();

                console.log("JWT:", token);

                localStorage.setItem("token", token);
                localStorage.setItem("user", JSON.stringify({
                    email: emailValue,
                    role: "JOB_SEEKER"
                }));

                // Animation
                const loginCard = document.querySelector(".login-card");
                loginCard.style.transform = "translateY(-20px)";
                loginCard.style.opacity = "0";
                loginCard.style.transition = "0.5s ease";

                setTimeout(() => {

                    // ⚠️ Agar UserHome.html kisi aur folder me hai to path change karna padega
                    window.location.href = "UserHome.html";

                }, 500);

            } catch (err) {

                console.error(err);

                alert(err.message);

                btn.innerHTML = "Sign In";
                btn.style.pointerEvents = "auto";
            }
        });
    </script>
</body>

</html>
