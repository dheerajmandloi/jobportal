    spring.application.name=jobportal

    # Database Configuration
    # FIX #9: Password ko environment variable se lo - plaintext mat likho
    spring.datasource.url=jdbc:mysql://localhost:3306/jobportal
    spring.datasource.username=root
    spring.datasource.password=${DB_PASSWORD:sneha}
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

    # Hibernate Configuration
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    spring.jpa.properties.hibernate.format_sql=true
    spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

    # JWT Configuration
    # FIX #10: JWT secret bhi environment variable se lo
    jwt.secret=${JWT_SECRET:YourSecretKeyForJobPortalApplication12345678901234567890}
    jwt.expiration=86400000

    # Server
    server.port=8080

    # FIX #11: Validation errors ka proper response
    spring.mvc.throw-exception-if-no-handler-found=true
